name: Process Knowledge

on:
  push:
    paths:
      - 'source/**'
      - '!source/.gitkeep'
    branches:
      - main

jobs:
  process-knowledge:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files in source/
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'source/' | grep -v '.gitkeep' || true)
          if [ -z "$FILES" ]; then
            echo "no_files=true" >> $GITHUB_OUTPUT
          else
            echo "no_files=false" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no source files
        if: steps.changed.outputs.no_files == 'true'
        run: echo "No source files to process. Skipping."

      - name: Create processing branch
        if: steps.changed.outputs.no_files == 'false'
        id: branch
        run: |
          BRANCH="knowledge/auto-$(date +%Y%m%d-%H%M%S)"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Install Claude Code
        if: steps.changed.outputs.no_files == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Process knowledge with Claude Code
        if: steps.changed.outputs.no_files == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p --dangerously-skip-permissions "
          あなたはチームナレッジ管理AIです。
          CLAUDE.mdのルールに従って以下の処理を行ってください。

          ## 処理対象
          source/ディレクトリに以下のファイルが追加されました：
          ${{ steps.changed.outputs.files }}

          ## 指示
          1. CLAUDE.mdを読んでナレッジ管理のルールを確認してください
          2. source/内の対象ファイルを読んでください
          3. 既存のナレッジファイル（company/, best-practices/, skills/）を確認し、関連や重複がないか調べてください
          4. 各ファイルの内容を理解し、適切なディレクトリに配置・統合してください
          5. 処理が完了したらsource/内の処理済みファイルを削除してください（.gitkeepは残す）
          "

      - name: Create PR with changes
        if: steps.changed.outputs.no_files == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto: process knowledge from source/

          Processed files: ${{ steps.changed.outputs.files }}

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "${{ steps.branch.outputs.name }}"

          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "auto: ナレッジ自動処理 $(date +%Y-%m-%d)" \
            --body "## 自動処理されたナレッジ

          ### 処理元ファイル
          ${{ steps.changed.outputs.files }}

          ### 処理内容
          source/に投入されたファイルをClaude Codeが自動で解析し、
          適切なディレクトリに配置・統合しました。

          CODEOWNERSに基づくレビュー承認後にマージしてください。"
